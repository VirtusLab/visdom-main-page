name: Deploy master to Cloudflare Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  deployments: write

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: cloudflare-pages
      url: https://visdom.virtuslab.com
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://npm.pkg.github.com
          # Required so npm sends the token when downloading the @virtuslab/visdom-ui
          # tarball from GitHub Packages; without it the download 401s.
          always-auth: true

      - name: DEBUG auth (temporary)
        env:
          TOK: ${{ secrets.PACKAGES_READ_TOKEN }}
          GTOK: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "PACKAGES_READ_TOKEN length: ${#TOK}  prefix: ${TOK:0:4}"
          echo "packument (PAT):  $(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $TOK" 'https://npm.pkg.github.com/@virtuslab%2fvisdom-ui')"
          echo "tarball   (PAT):  $(curl -s -L -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $TOK" 'https://npm.pkg.github.com/download/@virtuslab/visdom-ui/0.1.7/2aff5f8011ae585ee5e77c5e704a52e22a10d0b4')"
          echo "tarball   (token scheme): $(curl -s -L -o /dev/null -w '%{http_code}' -H "Authorization: token $TOK" 'https://npm.pkg.github.com/download/@virtuslab/visdom-ui/0.1.7/2aff5f8011ae585ee5e77c5e704a52e22a10d0b4')"
          echo "tarball   (GITHUB_TOKEN): $(curl -s -L -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $GTOK" 'https://npm.pkg.github.com/download/@virtuslab/visdom-ui/0.1.7/2aff5f8011ae585ee5e77c5e704a52e22a10d0b4')"
          echo "--- generated npmrc (redacted) ---"
          sed -E 's/[A-Za-z0-9_-]{20,}/REDACTED/g' "$NPM_CONFIG_USERCONFIG" || true

      - name: Install dependencies
        run: npm ci
        env:
          # @virtuslab/visdom-ui is a GitHub Packages npm package from another repo.
          # The built-in GITHUB_TOKEN cannot download it even with Actions-access
          # granted, so use PACKAGES_READ_TOKEN (classic PAT with read:packages).
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build site for custom domain
        run: npm run build
        env:
          SITE: https://visdom.virtuslab.com
          BASE: /

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT || 'visdom-main-page' }} --branch=master
