name: Deploy master to Cloudflare Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  deployments: write

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: cloudflare-pages
      url: https://visdom.virtuslab.com
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://npm.pkg.github.com
          # Required so npm sends the token when downloading the @virtuslab/visdom-ui
          # tarball from GitHub Packages; without it the download 401s.
          always-auth: true

      - name: DEBUG config (temporary)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          REDACT='s/ghp_[A-Za-z0-9]+/PAT_REDACTED/g; s/[A-Za-z0-9_-]{30,}/LONG_REDACTED/g'
          echo "userconfig path: $(npm config get userconfig)"
          echo "globalconfig path: $(npm config get globalconfig)"
          echo "=== NPM_CONFIG_USERCONFIG ($NPM_CONFIG_USERCONFIG) BEFORE set ==="
          sed -E "$REDACT" "$NPM_CONFIG_USERCONFIG" || true
          npm config set "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}"
          echo "=== userconfig AFTER npm config set ==="
          sed -E "$REDACT" "$(npm config get userconfig)" || true
          echo "=== project .npmrc ==="
          sed -E "$REDACT" .npmrc 2>/dev/null || true
          echo "=== global npmrc ==="
          sed -E "$REDACT" "$(npm config get globalconfig)" 2>/dev/null || true
          echo "resolved authToken host: [$(npm config get //npm.pkg.github.com/:_authToken)]"
          echo "resolved @virtuslab:registry: [$(npm config get @virtuslab:registry)]"

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          npm config set "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}"
          npm ci

      - name: Build site for custom domain
        run: npm run build
        env:
          SITE: https://visdom.virtuslab.com
          BASE: /

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT || 'visdom-main-page' }} --branch=master
