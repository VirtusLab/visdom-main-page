name: Deploy master to Cloudflare Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  deployments: write

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: cloudflare-pages
      url: https://visdom.virtuslab.com
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://npm.pkg.github.com
          # Required so npm sends the token when downloading the @virtuslab/visdom-ui
          # tarball from GitHub Packages; without it the download 401s.
          always-auth: true

      - name: DEBUG silly trace (temporary)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          npm config set "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}"
          npm install --no-save --loglevel=silly "@virtuslab/visdom-ui@0.1.7" 2>&1 \
            | sed -E 's/ghp_[A-Za-z0-9]+/REDACTED/g; s/gho_[A-Za-z0-9]+/REDACTED/g; s/[A-Fa-f0-9]{40}/REDACTED/g; s/([Aa]uthorization|authToken)[^,}"]*/\1 REDACTED/g' \
            | grep -iE 'visdom-ui|30[127]|location|401|redirect|http fetch|objects.github|blob' | head -40 || true

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          npm config set "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}"
          npm ci

      - name: Build site for custom domain
        run: npm run build
        env:
          SITE: https://visdom.virtuslab.com
          BASE: /

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT || 'visdom-main-page' }} --branch=master
