name: Deploy master to Cloudflare Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  deployments: write

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: cloudflare-pages
      url: https://visdom.virtuslab.com
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://npm.pkg.github.com
          # Required so npm sends the token when downloading the @virtuslab/visdom-ui
          # tarball from GitHub Packages; without it the download 401s.
          always-auth: true

      - name: Install dependencies
        env:
          # @virtuslab/visdom-ui is a GitHub Packages npm package from another repo;
          # PACKAGES_READ_TOKEN is a classic PAT with read:packages. We write the token
          # value into npm config directly (bash-expanded) so npm authenticates the
          # tarball download instead of relying on ${NODE_AUTH_TOKEN} expansion.
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          npm config set "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}"
          npm ci

      - name: Build site for custom domain
        run: npm run build
        env:
          SITE: https://visdom.virtuslab.com
          BASE: /

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT || 'visdom-main-page' }} --branch=master
